<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup & Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            background:url('https://images.pexels.com/photos/1976971/pexels-photo-1976971.jpeg?auto=compress&cs=tinysrgb&dpr=3&h=750&w=1260') no-repeat center center fixed ;
            background-size: auto;
        }

        .container {
            width: 300px;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            text-align: center;
        }
        .form-container {
            display: none;
        }
        .form-container.active {
            display: block;
            background-color: #f5ede7;
        }
        .toggle-btn {
            background-color: #912d03c7;
            color: white;
            padding: 10px;
            margin: 10px 0;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            width: 100%;
        }
        .container input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .container button {
            width: 100%;
            padding: 10px;
            background-color: #90470b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div id="login" class="form-container active">
            <h2>Login</h2>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <button class="toggle-btn" onclick="toggleForm('signup')">Go to Signup</button>
        </div>

        <div id="signup" class="form-container">
            <h2>Signup</h2>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Signup</button>
            <button class="toggle-btn" onclick="toggleForm('login')">Go to Login</button>
        </div>
    </div>

    <script>
        function toggleForm(formId) {
            document.getElementById("login").classList.remove("active");
            document.getElementById("signup").classList.remove("active");
            document.getElementById(formId).classList.add("active");
        }
    </script>
</body>
</html>
